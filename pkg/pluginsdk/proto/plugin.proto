syntax = "proto3";
package xolo.plugin.v1;
option go_package = "github.com/bornholm/xolo/pkg/pluginsdk/proto";

service XoloPlugin {
  rpc Describe(DescribeRequest) returns (PluginDescriptor);
  rpc Initialize(InitializeRequest) returns (InitializeResponse);
  rpc PreRequest(PreRequestInput) returns (PreRequestOutput);
  rpc PostResponse(PostResponseInput) returns (PostResponseOutput);
  rpc ResolveModel(ResolveModelInput) returns (ResolveModelOutput);
  rpc ListModels(ListModelsInput) returns (ListModelsOutput);
}

service XoloHostService {
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc SaveConfig(SaveConfigRequest) returns (SaveConfigResponse);
  rpc ListModels(ListModelsForOrgRequest) returns (ListModelsForOrgResponse);
}

message ListModelsForOrgRequest {
  string org_id = 1;
}
message ListModelsForOrgResponse {
  repeated ModelInfo models = 1;
}

message InitializeRequest {
  uint32 host_service_broker_id = 1;
}
message InitializeResponse {
  uint32 http_ui_port = 1;
}

message GetConfigRequest {
  string org_id     = 1;
  string plugin_name = 2;
}
message GetConfigResponse {
  string config_json = 1;
}
message SaveConfigRequest {
  string org_id      = 1;
  string plugin_name = 2;
  string config_json = 3;
}
message SaveConfigResponse {}

message DescribeRequest {}

// PortDescriptor describes a typed input or output port of a plugin node.
message PortDescriptor {
  string name      = 1;
  string port_type = 2; // "request" | "response" | "number" | "string" | "boolean"
  bool   required  = 3;
}

message PluginDescriptor {
  string name = 1;
  string version = 2;
  string description = 3;
  repeated Capability capabilities = 4;
  enum Capability {
    CAPABILITY_UNSPECIFIED = 0;
    PRE_REQUEST = 1;
    POST_RESPONSE = 2;
    RESOLVE_MODEL = 3;
    LIST_MODELS = 4;
  }
  string config_schema = 5;
  string user_config_schema = 6;
  bool default_required = 7;
  repeated PortDescriptor input_ports  = 8; // typed input ports for pipeline graph
  repeated PortDescriptor output_ports = 9; // typed output ports for pipeline graph
}

message RequestContext {
  string org_id = 1;
  string user_id = 2;
  string token_id = 3;
  string config_json = 4;
  string user_config_json = 5;
  string display_name = 6;
}

message ModelInfo {
  string proxy_name = 1;
  string real_model = 2;
  string provider_id = 3;
  double prompt_cost_per_1k_tokens = 4;
  double completion_cost_per_1k_tokens = 5;
  int64 token_limit = 6;
  bool is_virtual = 7;
  int64 context_length = 8;
  bool supports_vision = 9;
  bool supports_files = 10;
  float active_params_billions = 11;
  bool supports_reasoning = 12;
  bool supports_embeddings = 13;
}

message QuotaInfo {
  double daily_remaining = 1;
  double daily_total = 2;
  double monthly_remaining = 3;
  double monthly_total = 4;
  double yearly_remaining = 5;
  double yearly_total = 6;
}

message VirtualModelInfo {
  string id = 1;
  string name = 2;
  string org_id = 3;
  string description = 4;
}

message PreRequestInput {
  RequestContext ctx = 1;
  string model = 2;
  string messages_json = 3;
  // inputs_json contains the values of connected input ports as a JSON object
  // {portName: value}. Populated by the pipeline engine from upstream node outputs.
  string inputs_json = 4;
}

message PreRequestOutput {
  bool allowed = 1;
  string rejection_reason = 2;
  string response_json = 3;
  // modified_messages_json, when non-empty, replaces the request messages.
  string modified_messages_json = 4;
  // node_state is an opaque byte blob the plugin can use to correlate
  // PreRequest with its corresponding PostResponse call in the same pipeline
  // execution (e.g. store a pseudonymisation mapping).
  bytes node_state = 5;
  // outputs_json contains the values produced on output ports as a JSON object
  // {portName: value}. The pipeline engine stores these for downstream nodes.
  string outputs_json = 6;
}

message PostResponseInput {
  RequestContext ctx = 1;
  string model = 2;
  int64 prompt_tokens = 3;
  int64 completion_tokens = 4;
  bool had_error = 5;
  // response_content is the full LLM response text passed for post-processing.
  string response_content = 6;
  // node_state is the opaque blob returned by the plugin's PreRequest call
  // for the same pipeline execution.
  bytes node_state = 7;
}

message PostResponseOutput {
  // modified_response_content, when non-empty, replaces the LLM response
  // sent back to the client (enables response transformation e.g. de-pseudonymisation).
  string modified_response_content = 1;
}

message ResolveModelInput {
  RequestContext ctx = 1;
  string requested_model = 2;
  repeated ModelInfo available_models = 3;
  string messages_json = 4;
  repeated VirtualModelInfo virtual_models = 5;
  QuotaInfo quota = 6;
  string body_json = 7;
}

message ResolveModelOutput {
  string resolved_proxy_name = 1;
  // response_content, when non-empty, instructs the proxy to short-circuit the
  // request and return the provided text directly without calling any real LLM.
  string response_content = 2;
}

message ListModelsInput {
  RequestContext ctx = 1;
  repeated ModelInfo available_models = 2;
}

message ListModelsOutput {
  repeated string additional_proxy_names = 1;
}
