version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: xolo-server
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./cmd/server
    binary: xolo-server
    flags:
      - -trimpath
    ldflags:
      - -w -s -X 'github.com/bornholm/xolo/internal/build.ShortVersion={{ .Version }}' -X 'github.com/bornholm/xolo/internal/build.LongVersion={{ .Version }}'

  - id: xolo-plugin-time-restriction
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./plugins/time-restriction
    binary: xolo-plugin-time-restriction
    flags:
      - -trimpath
    ldflags:
      - -w -s

  - id: xolo-plugin-dummy-model
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./plugins/dummy-model
    binary: xolo-plugin-dummy-model
    flags:
      - -trimpath
    ldflags:
      - -w -s

  - id: xolo-plugin-fuzzy-evaluator
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./plugins/fuzzy-evaluator
    binary: xolo-plugin-fuzzy-evaluator
    flags:
      - -trimpath
    ldflags:
      - -w -s

  - id: xolo-plugin-request-evaluator
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./plugins/request-evaluator
    binary: xolo-plugin-request-evaluator
    flags:
      - -trimpath
    ldflags:
      - -w -s

  - id: xolo-plugin-script-processor
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./plugins/script-processor
    binary: xolo-plugin-script-processor
    flags:
      - -trimpath
    ldflags:
      - -w -s

  - id: xolo-plugin-pseudonymizer
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./plugins/pseudonymizer
    binary: xolo-plugin-pseudonymizer
    flags:
      - -trimpath
    ldflags:
      - -w -s

  - id: xolo-plugin-mcp-bridge
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./plugins/mcp-bridge
    binary: xolo-plugin-mcp-bridge
    flags:
      - -trimpath
    ldflags:
      - -w -s

  - id: xolo-plugin-system-prompt
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./plugins/system-prompt
    binary: xolo-plugin-system-prompt
    flags:
      - -trimpath
    ldflags:
      - -w -s

checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  name_template: "v{{ .Version }}"

dockers:
  - id: xolo-server
    ids:
      - xolo-server
      - xolo-plugin-time-restriction
      - xolo-plugin-dummy-model
      - xolo-plugin-fuzzy-evaluator
      - xolo-plugin-request-evaluator
      - xolo-plugin-script-processor
      - xolo-plugin-pseudonymizer
      - xolo-plugin-mcp-bridge
      - xolo-plugin-system-prompt
    use: docker
    dockerfile: misc/docker/xolo-server.Dockerfile
    image_templates:
      - ghcr.io/{{ tolower ( .Env.REPO_OWNER ) }}/xolo-server:{{ .Version }}
      - ghcr.io/{{ tolower ( .Env.REPO_OWNER ) }}/xolo-server:latest
